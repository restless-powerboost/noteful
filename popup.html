<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <h1 id="domain">Noteful</h1>
  </header>
  <div class="toolbar">
    <button id="newBtn" class="btn-primary">+ New note</button>
    <div class="toolbar-row">
      <button id="showAllBtn" class="btn-ghost">Show all</button>
      <button id="hideAllBtn" class="btn-ghost">Hide all</button>
    </div>
    <div class="search-wrap">
      <input type="search" id="searchInput" placeholder="Search all notes...">
    </div>
  </div>
  <ul id="notesList"></ul>
  <p id="emptyState" class="hidden">No notes on this page yet.</p>
  <p id="noResults" class="hidden">No matches.</p>
  <p id="errorState" class="hidden"></p>
  <footer class="footer">
    <button id="optionsBtn" class="link-btn">Settings…</button>
  </footer>
  <div id="undoToast" class="toast hidden">
    <span id="undoText">Note deleted</span>
    <button id="undoBtn">Undo</button>
  </div>
  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
